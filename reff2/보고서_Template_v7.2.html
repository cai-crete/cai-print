<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre-te Report Templates (AI-Ready Architecture)</title>
    <style>
        /* =================================================================
       [공통 페이지 및 A3 규격 설정]
       ================================================================= */
        :root {
            --page-w: 420mm;
            --page-h: 297mm;
            --line-color: rgba(255, 0, 0, 0.25);
            /* 빨간색 축열선 가이드 */
        }

        body {
            background: #2b2b2b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            gap: 50px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .page {
            position: relative;
            width: var(--page-w);
            height: var(--page-h);
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* -----------------------------------------------------------------
       [하단 공통 Footer (배경 이미지화)]
       ----------------------------------------------------------------- */
        .bg-footer-left {
            position: absolute;
            left: 13mm;
            top: 281mm;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        .bg-footer-right {
            position: absolute;
            left: 287mm;
            top: 281mm;
            width: 119mm;
            text-align: right;
            line-height: 1.4;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        .bg-footer-right .copy {
            font-size: 7.5pt;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* -----------------------------------------------------------------
       [그리드(축열) 레이어 설정]
       ----------------------------------------------------------------- */
        .grid-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            z-index: 20;
        }

        .guide-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            z-index: 10;
            pointer-events: none;
        }

        .guide-box {
            border-right: 1px dashed var(--line-color);
            border-bottom: 1px dashed var(--line-color);
            box-sizing: border-box;
        }

        /* -----------------------------------------------------------------
       [에디터 스타일 및 타이포그래피]
       ----------------------------------------------------------------- */
        [contenteditable="true"] {
            outline: none;
            cursor: text;
            transition: 0.2s;
        }

        [contenteditable="true"]:hover {
            box-shadow: 0 0 0 1px #00b894;
            background: rgba(0, 184, 148, 0.05);
        }

        .t-main {
            font-size: 50pt;
            font-weight: 900;
            letter-spacing: -1.5px;
            line-height: 1;
            color: #000;
            align-self: end;
        }

        .t-body {
            font-size: 10.5pt;
            line-height: 1.6;
            color: #555;
            align-self: stretch;
            overflow: hidden;
        }

        .img-box {
            background: #e6e6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13pt;
            color: #333;
            text-align: center;
            line-height: 1.4;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

                html: `
                <div class="t-main" contenteditable="true" style="grid-column: 2 / 6; grid-row: 2; align-self: start;">00 &nbsp;Topic of the contents</div>
                
                <div contenteditable="true" style="grid-column: 2; grid-row: 4; background: #000; color: #fff; font-size: 14pt; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; justify-self: start; align-self: start; padding: 4px 15px; letter-spacing: 0.5px;">Process</div>
                <div class="t-body" contenteditable="true" style="grid-column: 3 / 6; grid-row: 4 / 6; padding-left: 15px;">전체적인 진행 과정을 한눈에 파악할 수 있는 단계별 설명이 들어갑니다.<br>기획부터 설계 완료까지의 흐름이나 핵심 건축 포인트를 보여주는 용도로 활용해 보세요.<br>총 3줄까지 작성 가능합니다. 중요한 3가지 핵심 디자인 포인트를 나열하여 설명하세요.</div>

        function renderPages() {
            const body = document.body;
            const wrapper = document.createElement('div');
            wrapper.id = 'preview-wrapper';
            wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column'; wrapper.style.gap = '50px';

            pagesData.forEach(p => {
                const page = document.createElement('div');
                page.className = 'page';

                const bgFooter = document.createElement('div');
                bgFooter.innerHTML = `
                <div class="bg-footer-left">
                    <img src="image_3b0126.png" style="width:14mm; height:6mm;" alt="CRE-TE">
                </div>
                <div class="bg-footer-right">
                    <div class="copy">COPYRIGHTS 2026. CRETE CO.,LTD. ALL RIGHTS RESERVED.</div>
                </div>
            `;
                page.appendChild(bgFooter);

                const gridStyle = `grid-template-columns: ${p.cols}; grid-template-rows: ${p.rows};`;

                const guides = document.createElement('div');
                guides.className = 'guide-layer';
                guides.style.cssText = gridStyle;

                const numCols = p.cols.split(' ').length;
                const numRows = p.rows.split(' ').length;
                for (let i = 0; i < numCols * numRows; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'guide-box';
                    guides.appendChild(cell);
                }
                page.appendChild(guides);

                const content = document.createElement('div');
                content.className = 'grid-container';
                content.style.cssText = gridStyle;
                content.innerHTML = p.html;
                page.appendChild(content);

                wrapper.appendChild(page);
            });

            body.appendChild(wrapper);
            fitToScreen();
        }

        function fitToScreen() {
            const wrapper = document.getElementById('preview-wrapper');
            const contentWidth = (420 * 3.779527) + 80;
            let scale = window.innerWidth / contentWidth;
            if (scale > 1) scale = 1;
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.transformOrigin = 'top center';
        }

        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', renderPages);

</html>
